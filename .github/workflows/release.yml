name: Release

on:
  push:
    tags:
      - '20[0-9][0-9].*.*.*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Build all modules
        run: mvn -B package

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" `
            --title "${{ github.ref_name }}" `
            --generate-notes `
            CimPal-Main/target/CimPal.exe `
            CimPal-Main/target/CimPal.jar `
            CimPal-CLI/target/CimPal-CLI.jar